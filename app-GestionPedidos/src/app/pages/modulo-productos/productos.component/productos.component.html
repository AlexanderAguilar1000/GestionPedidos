<div class="productos-page">

  <!-- Top Navigation Bar -->
  <header class="top-bar">
    <div class="top-bar__inner">
      <div class="brand">
        <div class="brand__icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
            <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
            <line x1="12" y1="22.08" x2="12" y2="12"/>
          </svg>
        </div>
        <span class="brand__name">Sematext</span>
      </div>

      <nav class="top-nav">
        <span class="top-nav__item top-nav__item--active">Productos</span>
        <span class="top-nav__item">Pedidos</span>
        <span class="top-nav__item">Clientes</span>
      </nav>
    </div>
  </header>

  <!-- Main Content -->
  <main class="page-main">
    <div class="page-container">

      <div class="page-heading">
        <h1 class="page-heading__title">Gestión de Productos</h1>
        <p class="page-heading__sub">Administre el catálogo de productos del sistema</p>
      </div>

      @if (mensajeExito()) {
        <div class="alert alert--success">{{ mensajeExito() }}</div>
      }
      @if (mensajeError()) {
        <div class="alert alert--error">{{ mensajeError() }}</div>
      }

      <!--Este representa el componente para registrar un producto el formulario -->
      <div class="content-area">
        <app-producto-form
          (productoRegistrado)="onProductoRegistrado($event)"
          (cancelar)="onCancelar()"
        />
      </div>

    </div>
  </main>

</div>
